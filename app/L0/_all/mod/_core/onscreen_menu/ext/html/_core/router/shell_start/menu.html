<link rel="stylesheet" href="/mod/_core/onscreen_menu/onscreen-menu.css" />

<div
  x-data="{
    isOpen: false,
    sortFrames: {},
    sortObservers: {},
    sortTargets: {},
    singleUserApp: Boolean(window.space?.config?.get('SINGLE_USER_APP', false)),
    enterTabAccessKey: 'space.enter.tab-access',
    readItemOrder(element) {
      const orderElement = element.matches?.('[data-order], [order]')
        ? element
        : element.querySelector?.('[data-order], [order]');
      const rawOrder = orderElement?.dataset?.order ?? orderElement?.getAttribute?.('order');
      const order = Number.parseFloat(rawOrder);
      return Number.isFinite(order) ? order : Number.POSITIVE_INFINITY;
    },
    sortExtensionItems(targetName) {
      const itemsElement = this.sortTargets[targetName];
      if (!itemsElement) {
        return;
      }

      const items = Array.from(itemsElement.children).map((element, index) => ({
        element,
        index,
        order: this.readItemOrder(element)
      }));
      const sortedItems = [...items].sort((left, right) => {
        if (left.order !== right.order) {
          return left.order - right.order;
        }

        return left.index - right.index;
      });

      if (sortedItems.every((item, index) => item.element === items[index]?.element)) {
        return;
      }

      const fragment = document.createDocumentFragment();
      sortedItems.forEach((item) => fragment.appendChild(item.element));
      itemsElement.appendChild(fragment);
    },
    scheduleExtensionSort(targetName) {
      if (this.sortFrames[targetName]) {
        return;
      }

      this.sortFrames[targetName] = requestAnimationFrame(() => {
        this.sortFrames[targetName] = 0;
        this.sortExtensionItems(targetName);
      });
    },
    mountSortedExtension(targetName, itemsElement) {
      this.sortTargets[targetName] = itemsElement;
      this.scheduleExtensionSort(targetName);

      if (!itemsElement || typeof MutationObserver !== 'function') {
        return;
      }

      const observer = new MutationObserver(() => this.scheduleExtensionSort(targetName));
      observer.observe(itemsElement, {
        attributeFilter: ['data-order', 'order'],
        attributes: true,
        childList: true,
        subtree: true
      });
      this.sortObservers[targetName] = observer;
    },
    unmountSortedExtensions() {
      Object.values(this.sortObservers).forEach((observer) => observer?.disconnect());
      this.sortObservers = {};

      Object.values(this.sortFrames).forEach((frame) => {
        if (frame) {
          cancelAnimationFrame(frame);
        }
      });
      this.sortFrames = {};
      this.sortTargets = {};
    },
    isEmbeddedInsideAdmin() {
      if (window.top === window) {
        return false;
      }

      try {
        const __b = window.__SPACE_BASE_PATH__ || '';
        const adminPath = __b + '/admin';
        return window.top.location.pathname === adminPath || window.top.location.pathname === '/admin';
      } catch {
        return false;
      }
    },
    navigateCurrent(targetUrl, mode = 'assign') {
      const __b = window.__SPACE_BASE_PATH__ || '';
      if (__b && typeof targetUrl === 'string' && targetUrl.startsWith('/') && targetUrl !== __b && !targetUrl.startsWith(__b + '/')) {
        targetUrl = __b + targetUrl;
      }
      window.location[mode](targetUrl);
    },
    navigateTop(targetUrl, mode = 'assign') {
      const __b = window.__SPACE_BASE_PATH__ || '';
      if (__b && typeof targetUrl === 'string' && targetUrl.startsWith('/') && targetUrl !== __b && !targetUrl.startsWith(__b + '/')) {
        targetUrl = __b + targetUrl;
      }
      try {
        window.top.location[mode](targetUrl);
      } catch {
        window.location[mode](targetUrl);
      }
    },
    openRoute(routeHash) {
      const routeUrl = new URL(window.location.pathname + window.location.search, window.location.origin);
      routeUrl.hash = routeHash;
      this.isOpen = false;

      if (this.isEmbeddedInsideAdmin()) {
        this.navigateCurrent(routeUrl.href);
        return;
      }

      this.navigateTop(routeUrl.href);
    },
    openHome() {
      this.openRoute('/');
    },
    openLogout() {
      this.isOpen = false;
      try {
        window.space?.utils?.userCrypto?.clearSession?.();
      } catch {}
      this.navigateTop('/logout');
    },
    openLeave() {
      this.isOpen = false;
      try {
        window.sessionStorage.removeItem(this.enterTabAccessKey);
      } catch {}
      this.navigateTop('/enter', 'replace');
    },
    openExit() {
      if (this.singleUserApp) {
        this.openLeave();
        return;
      }

      this.openLogout();
    }
  }"
  class="onscreen-menu"
  x-init="$nextTick(() => { mountSortedExtension('barStart', $refs.barStart); mountSortedExtension('barEnd', $refs.barEnd); mountSortedExtension('items', $refs.items); })"
  x-destroy="unmountSortedExtensions()"
  @click.outside="isOpen = false"
  @keydown.escape.window="isOpen = false"
>
  <header class="onscreen-menu-bar" aria-label="Page controls">
    <div class="space-topbar onscreen-menu-shell">
      <div class="onscreen-menu-side onscreen-menu-side--start">
        <x-extension id="_core/onscreen_menu/bar_start" x-ref="barStart"></x-extension>
      </div>

      <div class="onscreen-menu-actions">
        <div class="onscreen-menu-side onscreen-menu-side--end">
          <x-extension id="_core/onscreen_menu/bar_end" x-ref="barEnd"></x-extension>
        </div>

        <button
          type="button"
          class="space-topbar-button space-topbar-button--icon onscreen-menu-button"
          aria-label="Open home"
          title="Home"
          @click="openHome()"
        >
          <x-icon>home</x-icon>
        </button>

        <div class="space-topbar-menu onscreen-menu-dropdown">
          <button
            type="button"
            class="space-topbar-button space-topbar-button--icon onscreen-menu-button"
            :class="{ 'is-active': isOpen }"
            aria-label="Open page menu"
            aria-haspopup="menu"
            aria-controls="onscreen-menu-panel"
            :aria-expanded="String(isOpen)"
            @click="isOpen = !isOpen"
          >
            <x-icon>menu</x-icon>
          </button>

          <div
            id="onscreen-menu-panel"
            class="space-topbar-menu-panel onscreen-menu-panel"
            x-cloak
            x-show="isOpen"
            x-transition.opacity.scale.origin.top.right.duration.160ms
            role="menu"
            aria-label="Page menu"
          >
            <x-extension id="_core/onscreen_menu/items" x-ref="items"></x-extension>

            <button
              type="button"
              class="space-topbar-menu-action"
              role="menuitem"
              @click="openExit()"
            >
              <x-icon x-text="singleUserApp ? 'exit_to_app' : 'logout'"></x-icon>
              <span
                class="space-topbar-menu-action-label"
                x-text="singleUserApp ? 'Leave' : 'Logout'"
              ></span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>
</div>
